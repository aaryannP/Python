{% extends 'crud_app/base.html' %}

{% block content %}
    <h2>{{ object.name }}</h2>
    
    <div style="background: #fafafa; padding: 20px; border: 1px solid #ddd; border-radius: 5px;">
        <p style="font-size: 16px; line-height: 1.5; color: #444;">{{ object.description }}</p>
        <p style="font-size: 20px; font-weight: bold; color: #e91e63;">Price: ${{ object.price }}</p>
        
        <div style="margin-top: 20px;">
            <a href="{% url 'product_update' object.pk %}" class="btn" style="background: #ffc107; color: black;">Edit Product</a>
            <a href="{% url 'product_delete' object.pk %}" class="btn btn-danger">Delete Product</a>
            <a href="{% url 'product_list' %}" class="btn btn-secondary">Back to List</a>
        </div>
    </div>
{% endblock %}
