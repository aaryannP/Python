<!DOCTYPE html>
<html>
<head>
    <title>Uploaded Profiles</title>
</head>
<body>
    <h2>User Profiles</h2>
    <a href="{% url 'upload_profile' %}">Upload New Profile</a>
    <hr>
    <div style="display: flex; flex-wrap: wrap; gap: 20px; margin-top: 20px;">
        {% for profile in profiles %}
            <div style="border: 1px solid #ccc; padding: 10px; border-radius: 5px; text-align: center; width: 200px;">
                {% if profile.profile_picture %}
                    <!-- The object.url attribute provides the path configured via MEDIA_URL -->
                    <img src="{{ profile.profile_picture.url }}" alt="{{ profile.name }}" style="max-width: 100%; height: auto; border-radius: 50%;">
                {% else %}
                    <p>No image</p>
                {% endif %}
                <h3>{{ profile.name }}</h3>
            </div>
        {% empty %}
            <p>No profiles found.</p>
        {% endfor %}
    </div>
</body>
</html>
