<!DOCTYPE html>
<html>
<head>
    <title>Book List (Optimized Query)</title>
</head>
<body>
    <h1>Book List</h1>
    <ul>
        {% for book in books %}
            <li><strong>{{ book.title }}</strong> by {{ book.author.name }}</li>
        {% empty %}
            <li>No books found.</li>
        {% endfor %}
    </ul>
    <a href="{% url 'advanced_home' %}">Back to Home</a>
</body>
</html>
