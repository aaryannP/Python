<!DOCTYPE html>
<html>
<head>
    <title>CBV Demo Site</title>
    <style>
        body { font-family: sans-serif; margin: 0; padding: 0; background-color: #f9f9f9; }
        nav { background: #333; padding: 15px; color: white; display: flex; justify-content: space-around; }
        nav a { color: white; text-decoration: none; font-weight: bold; }
        nav a:hover { text-decoration: underline; }
        .container { padding: 30px; max-width: 800px; margin: 0 auto; background: white; min-height: 400px; box-shadow: 0 0 10px rgba(0,0,0,0.1); }
    </style>
</head>
<body>
    <nav>
        <a href="{% url 'cbv_home' %}">Home</a>
        <a href="{% url 'cbv_about' %}">About Us</a>
        <a href="{% url 'api_courses' %}">API: Courses</a>
        <a href="{% url 'cbv_contact' %}">Contact</a>
    </nav>

    <div class="container">
        {% block content %}
        {% endblock %}
    </div>
</body>
</html>
