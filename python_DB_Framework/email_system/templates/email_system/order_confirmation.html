<!DOCTYPE html>
<html>
<head>
    <style>
        body { font-family: Arial, sans-serif; background-color: #f4f4f4; padding: 20px; }
        .receipt { background-color: white; padding: 20px; border-radius: 5px; max-width: 500px; margin: 0 auto; }
        .header { background-color: #fc8019; color: white; padding: 15px; text-align: center; border-radius: 5px 5px 0 0; }
        .order-details { margin-top: 20px; }
        ul { list-style-type: none; padding: 0; }
        li { padding: 8px 0; border-bottom: 1px solid #ddd; }
        .total { font-size: 18px; font-weight: bold; text-align: right; margin-top: 15px; }
    </style>
</head>
<body>
    <div class="receipt">
        <div class="header">
            <h2>Swiggy Order Confirmation</h2>
        </div>
        <div class="order-details">
            <p>Hi <strong>{{ name }}</strong>,</p>
            <p>Thank you for your order! Your food is being prepared. Here are the details:</p>
            <p><strong>Order ID:</strong> {{ order_id }}</p>
            
            <h3>Items Ordered:</h3>
            <ul>
                {% for item in items %}
                    <li>{{ item }}</li>
                {% endfor %}
            </ul>
            
            <div class="total">
                Total: {{ total }}
            </div>
            
            <p style="text-align: center; color: #777; margin-top: 30px; font-size: 12px;">
                We hope you enjoy your meal!
            </p>
        </div>
    </div>
</body>
</html>
