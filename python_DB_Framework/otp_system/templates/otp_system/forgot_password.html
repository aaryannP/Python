<!DOCTYPE html>
<html>
<head>
    <title>Forgot Password</title>
    <style>
        body { font-family: sans-serif; padding: 20px; }
        form { margin-top: 20px; }
    </style>
</head>
<body>
    <h2>Forgot Password</h2>
    <p>Enter your email to receive a 6-digit OTP for password reset.</p>
    
    <form method="POST">
        {% csrf_token %}
        {{ form.as_p }}
        <button type="submit">Send OTP</button>
    </form>
</body>
</html>
